<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { width: 420px; background-color: #0f172a; color: #e2e8f0; font-family: 'Courier New', monospace; }
        .cyber-border { border: 1px solid #22d3ee; box-shadow: 0 0 8px #22d3ee; }
        .cyber-btn { background: linear-gradient(90deg, #0ea5e9, #22d3ee); clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); }
        canvas { max-width: 100%; height: auto; display: block; }
    </style>
</head>
<body class="p-4">
    <div class="flex items-center justify-between mb-4 border-b border-cyan-900 pb-2">
        <h1 class="text-lg font-black text-cyan-400 italic">BUG_HUNTER_ULTIMATE</h1>
        <span class="text-[8px] bg-red-900 px-2 py-1 rounded text-red-200 animate-pulse">V1.2_STABLE</span>
    </div>
    
    <button id="collectBtn" class="cyber-btn w-full text-slate-900 font-black py-3 mb-4 hover:brightness-110 transition-all">
        START SYSTEM SCAN
    </button>

    <div id="reportSection" class="hidden space-y-4">
        <div>
            <div class="flex justify-between items-center mb-1">
                <label class="text-[10px] text-cyan-500 uppercase">Screenshot Editor</label>
                <div class="flex gap-2">
                    <button id="colorRed" class="w-4 h-4 rounded-full bg-red-600 border border-white"></button>
                    <button id="colorCyan" class="w-4 h-4 rounded-full bg-cyan-400 border border-white"></button>
                </div>
            </div>
            <div class="cyber-border relative bg-slate-800 rounded-sm overflow-hidden">
                <canvas id="screenshotCanvas" class="cursor-crosshair"></canvas>
            </div>
            <button id="downloadImg" class="mt-2 text-[9px] text-cyan-300 underline uppercase tracking-widest hover:text-white">Download Screenshot</button>
        </div>

        <div>
            <label class="text-[10px] text-cyan-500 mb-1 block uppercase">Security-Filtered Markdown</label>
            <textarea id="output" class="w-full h-48 p-3 bg-slate-950 border border-slate-800 text-cyan-100 text-[11px] focus:border-cyan-500 outline-none rounded"></textarea>
        </div>
        
        <button id="copyBtn" class="w-full border border-emerald-500 text-emerald-500 hover:bg-emerald-500/10 py-2 text-xs font-bold uppercase tracking-widest transition-colors">
            Copy Report to Clipboard
        </button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
